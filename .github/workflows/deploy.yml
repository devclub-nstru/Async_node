name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout Repository
      - name: Checkout
        uses: actions/checkout@v4

      # Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Dependencies
        run: npm install

      - name: Test Server
        working-directory: app/server
        run: npm test

      - name: Build Server
        working-directory: app/server
        run: npm run build

      - name: Build Web
        working-directory: app/web
        run: npm run build

      # Login Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build Backend Image
      - name: Build Backend Image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/asyncnode-server:latest \
            -f app/server/docker/dockerfile \
            app/server

      # Push Backend Image
      - name: Push Backend Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/asyncnode-server:latest

      # Build Frontend Image
      - name: Build Frontend Image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/asyncnode-web:latest \
            -f app/web/docker/dockerfile \
            app/web

      # Push Frontend Image
      - name: Push Frontend Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/asyncnode-web:latest

      # Setup SSH
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      # Deploy
      - name: Deploy to EC2
        env:
          ENV_FILE: ${{ secrets.ENV }}
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "cat > /opt/Async_node/docker/.env" <<< "$ENV_FILE"

          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
          cd /opt/Async_node

          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
            -u "${{ secrets.DOCKER_USERNAME }}" \
            --password-stdin

          docker compose pull
          docker compose up -d --remove-orphans
          EOF
