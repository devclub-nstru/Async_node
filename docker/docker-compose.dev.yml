services:
  redis:
    image: redis:alpine
    container_name: redis

    ports:
      - "6379:6379"

    restart: unless-stopped

  postgres:
    image: postgres:17-alpine

    ports:
      - "5433:5432"

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    
    volumes:
      - postgres-data:/var/lib/postgresql/data

    restart: unless-stopped
volumes:
  postgres-data:
